# ~/.config/fuzzel/fuzzel.ini

[main]
# [升级] 字体放大到 16，加粗，与 Waybar 保持视觉统一
font=JetBrainsMono Nerd Font:weight=bold:size=10

# 提示符图标 (保持原样，很棒)
prompt="  "

# 图标主题 (保持 Papirus，非常好看)
icon-theme=Papirus

# [调整] 因为字体变大了，字符宽度可以稍微减少一点，或者保持 50 让它更宽
width=45
# 显示行数 (稍减一点，大字体不需要太多行)
lines=10

# [美化] 增加内边距，让大字体有呼吸感
horizontal-pad=40
vertical-pad=25
inner-pad=15

# 关键设置：保证在最上层
layer=overlay

# 退出时打印选中的内容
exit-on-keyboard-focus-loss=yes

[colors]
# --- Catppuccin Mocha 配色方案 (优化版) ---

# 背景：深蓝灰 + dd (约87%不透明度)，让 Hyprland 的 blur 效果透出来
background=1e1e2edd

# 默认文字：亮灰白
text=cdd6f4ff

# 输入框光标颜色 (新增)
prompt=bac2deff
input=cdd6f4ff

# [重点] 选中项背景：蓝色 (Blue) - 呼应 Waybar 的选中态
selection=89b4faff

# 选中项文字：深色底 (Crust) - 保证高对比度清晰可见
selection-text=11111bff

# [重点] 匹配字符的高亮颜色：改为淡紫色 (Mauve) - 呼应 Waybar 的时钟和箭头
match=cba6f7ff

# 选中状态下的匹配字符颜色：深红 (Maroon) 或保持深色，这里选深色更稳
selection-match=11111bff

# 边框颜色：蓝色 (Blue)
border=89b4faff

[border]
# 边框宽度：稍微加粗一点点，更有质感
width=3
# [升级] 圆角半径：加大到 20，与 Waybar 和窗口圆角统一
radius=20
