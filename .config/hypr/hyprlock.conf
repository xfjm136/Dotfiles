# hyprlock.conf
# 更多配置参考：https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock

$textFont = Inconsolata Bold
$font = Monospace

general {
    hide_cursor = false
}

# 启用指纹认证（需系统已配置好指纹，如 fprintd 等）
auth {
    fingerprint {
        enabled = true
        ready_message = 请按下指纹解锁
        present_message = 正在扫描指纹...
        retry_delay = 250 # 毫秒
    }
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 2, linear
    animation = fadeOut, 1, 2, linear
    animation = inputFieldDots, 1, 2, default
}

background {
    monitor =
    path = $HOME/.cache/awww/current_wallpaper
    blur_passes = 3
    blur_size = 6
}

input-field {
    monitor =
    size = 320, 48
    outline_thickness = 3
    inner_color = rgba(0, 0, 0, 0.25) # 半透明背景

    outer_color = rgba(d3e4c9ff)
    check_color = rgba(7fbfffff)
    fail_color = rgba(ff7f7fff)

    font_color = rgba(ffffffff)
    fade_on_empty = false
    rounding = 24

    font_family = $font
    placeholder_text = 请输入密码...
    fail_text = 密码错误，请重试

    # dots_text_format = *
    # dots_size = 0.4
    dots_spacing = 0.3

    # 如果想隐藏输入长度（像 swaylock 那样），可以打开：
    # hide_input = true

    position = 0, -20
    halign = center
    valign = center
}

# TIME
label {
    monitor =
    text = $TIME
    font_size = 96
    font_family = Inconsolata Bold

    position = 0, 240
    halign = center
    valign = center
}

# DATE
label {
    monitor =
    text = cmd[update:60000] date +"%Y-%m-%d %A" # 每 60 秒更新
    font_size = 18
    font_family = Inconsolata Medium

    position = 0, 160
    halign = center
    valign = center
}
