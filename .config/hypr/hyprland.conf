###############################################
#  Monitor
###############################################
monitor = , 1920x1200@60, 0x0, 1.0
# 也可以使用：
# monitor = , preferred, auto, 1.0

xwayland {
    force_zero_scaling = true
}

###############################################
#  Input
###############################################
input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0
    accel_profile = flat

    touchpad {
        natural_scroll = yes
    }
}

###############################################
# Input Method
###############################################
# 输入法相关环境变量
env = GTK_IM_MODULE, fcitx
env = QT_IM_MODULE, fcitx
env = XMODIFIERS, @im=fcitx
env = SDL_IM_MODULE, fcitx

###############################################
#  General
###############################################
general {
    gaps_in = 4
    gaps_out = 8
    # [建议] 边框厚度设为 2 或 3，流动效果才清晰
    border_size = 2

    # 静态冷色渐变边框
    col.active_border = rgb(89b4fa) rgb(cba6f7) 45deg

    # 非活动窗口：保持低调
    col.inactive_border = rgba(45475aaa)

    layout = dwindle
    allow_tearing = true
}
###############################################
#  Decoration
###############################################
decoration {
    rounding = 2
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 4
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = yes
        size = 6
        passes = 3
        new_optimizations = on
        ignore_opacity = on
    }
}

###############################################
# Cursor
###############################################
cursor {
    no_hardware_cursors = true
}


###############################################
# Animations
###############################################
animations {
    enabled = yes

    bezier = ease, 0.25, 0.1, 0.25, 1.0
    bezier = overshot, 0.13, 0.99, 0.29, 1.05

    animation = windows, 1, 5, overshot, gnomed
    animation = windowsOut, 1, 5, ease, slide bottom
    animation = windowsMove, 1, 5, overshot, slide

    animation = layers, 1, 5, ease, gnomed
    animation = fade, 1, 3, ease
    animation = border, 1, 2, ease
    animation = workspaces, 1, 5, overshot, slide
}

###############################################
# Dwindle
###############################################
dwindle {
    preserve_split = true
    split_width_multiplier = 1.33
}

###############################################
# Misc
###############################################
misc {
    # 1. 禁用 Hyprland 的 Logo (那个显示版本号的文字)
    disable_hyprland_logo = true

    # 2. 禁用默认的动漫壁纸 (关键设置)
    # 0 = 禁用默认壁纸 (变成纯黑色背景)
    # 1 = 启用默认壁纸
    # 2 = 强制默认壁纸
    force_default_wallpaper = 0

    # ... 您之前的设置 ...
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    render_unfocused_fps = 60
    enable_anr_dialog = false

    # [可选] 如果你想把过渡背景改成别的颜色（比如深灰），需要用 background_color
    # 但通常黑色是最自然的
    background_color = 0x11111b # 对应 Catppuccin Crust 深色
}

###############################################
# Layer Rules
###############################################
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace logout_dialog
layerrule = blur on, match:namespace swaync-control-center
layerrule = blur on, match:namespace swaync-notification-window
layerrule = ignore_alpha 0.5, match:namespace swaync-control-center
layerrule = ignore_alpha 0.5, match:namespace swaync-notification-window

###############################################
# Window Rules
###############################################
# --- 1. 基础应用 ---
# 想要 tile (平铺)，就设置 float 0
windowrule = float 0, match:class ^kitty$
windowrule = opacity 0.90 0.90, match:class ^obsidian$

# 想要 float (浮动)，就设置 float 1
windowrule = float 1, match:class ^QQ$
windowrule = float 1, match:class ^steam$
windowrule = float 1, match:class ^vlc$

# --- 2. 标题匹配 (title -> match:title) ---
windowrule = float 1, match:title ^Volume Control$
windowrule = float 1, match:title ^Qt5 Configuration Tool$
windowrule = float 1, match:title ^Qt6 Configuration Tool$
windowrule = float 1, match:title ^Fcitx Configuration$

# --- 3. 复杂应用类名 (class -> match:class) ---
windowrule = float 1, match:class ^org\.gnome\.Nautilus$

# Firefox Library 双重匹配 (注意写法：属性在前，匹配在后)
# 如果这行报错，可能是新版不支持单行双 match，建议先试这行，不行就删掉 title 部分
windowrule = float 1, match:class ^firefox$, match:title ^Library$

windowrule = float 1, match:class ^org\.telegram\.desktop$, match:title ^Media viewer$
windowrule = float 1, match:class ^com\.st\.app\.Main$
windowrule = float 1, match:class ^ltspice\.exe$
windowrule = float 1, match:class ^xdg-desktop-portal-gtk$

# --- 4. 模糊匹配 ---
windowrule = float 1, match:class ^qemu.*$

# --- 5. Clash Verge ---
windowrule = float 1, match:class ^clash-verge$
windowrule = center 1, match:class ^clash-verge$
# size 保持原样，因为它本身就有值
windowrule = size 1000 700, match:class ^clash-verge$

# --- 6. 特殊状态规则 ---
# pinned 状态匹配改为 match:pin 1
windowrule = border_color rgb(598da8) rgb(598da8), match:pin 1

# --- 7. 渲染规则 ---
# 注意：新版属性名通常变成蛇形命名 (render_unfocused) 且必须加值
windowrule = render_unfocused 1, match:class ^vseeface\.exe$

###############################################
# Variables
###############################################
$mainMod = SUPER

###############################################
# Function Key Bindings（亮度音量）
###############################################
bind = ,xf86audiomute, exec, pactl -- set-sink-mute @DEFAULT_SINK@ toggle
bind = ,xf86audiolowervolume, exec, pactl -- set-sink-volume @DEFAULT_SINK@ -5%
bind = ,xf86audioraisevolume, exec, pactl -- set-sink-volume @DEFAULT_SINK@ +5%
bind = ,xf86audiomicmute, exec, pactl -- set-source-mute @DEFAULT_SOURCE@ toggle

bind = ,xf86monbrightnessdown, exec, brightnessctl set 5%-
bind = ,xf86monbrightnessup, exec, brightnessctl set +5%

###############################################
# Wallpaper
###############################################
bind = SUPER, W, exec, ~/.config/hypr/wallpaper_random.sh
bind = SUPER SHIFT, W, exec, ~/.config/hypr/wallpaper_select.sh

###############################################
# Main Hotkeys
###############################################
bind = $mainMod, C, killactive
bind = $mainMod, T, exec, kitty
bind = $mainMod, M, exit
bind = $mainMod, E, exec, [float] nautilus --new-window
bind = $mainMod, V, togglefloating
bind = $mainMod, R, exec, fuzzel
bind = $mainMod, B, exec, resources
bind = $mainMod, P, pseudo
bind = $mainMod, J, layoutmsg, swapsplit
bind = $mainMod, F, fullscreen
bind = $mainMod, U, bringactivetotop
bind = $mainMod, Z, pin

# 弹出注销/关机菜单
bind = SUPER SHIFT, E, exec, wlogout -b 5

# reload Hyprland & input method
bind = $mainMod CTRL ALT, R, exec, killall waybar; waybar & killall fcitx5; fcitx5

###############################################
# Screenshot
###############################################
# 允许grim访问屏幕内容（取消注释并修改路径）
permission = /usr/bin/grim, screencopy, allow
# 允许xdg-desktop-portal-hyprland处理桌面门户请求
permission = /usr/lib/xdg-desktop-portal-hyprland, screencopy, allow

bind = , Print, exec, grim -g "$(slurp)" - | swappy -f -
bind =  $mainMod, Print, exec, grim - | swappy -f -

###############################################
# Focus Movement
###############################################
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

###############################################
# Workspaces
###############################################
$switch_script = ~/.config/hypr/switch_workspace.sh

bind = $mainMod, 1, exec, $switch_script switch 1
bind = $mainMod, 2, exec, $switch_script switch 2
bind = $mainMod, 3, exec, $switch_script switch 3
bind = $mainMod, 4, exec, $switch_script switch 4
bind = $mainMod, 5, exec, $switch_script switch 5
bind = $mainMod, X, togglespecialworkspace

bind = $mainMod SHIFT, 1, exec, $switch_script move 1
bind = $mainMod SHIFT, 2, exec, $switch_script move 2
bind = $mainMod SHIFT, 3, exec, $switch_script move 3
bind = $mainMod SHIFT, 4, exec, $switch_script move 4
bind = $mainMod SHIFT, 5, exec, $switch_script move 5
bind = $mainMod SHIFT, X, movetoworkspace, special

workspace = 1
workspace = 2
workspace = 3
workspace = 4
workspace = 5

bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###############################################
# Lock
###############################################
bind = $mainMod SHIFT, L, exec, hyprlock

###############################################
# Cursor Theme
###############################################
env = HYPRCURSOR_THEME,Bibata-Modern-Ice
env = HYPRCURSOR_SIZE,32
env = XCURSOR_THEME,Bibata-Modern-Ice
env = XCURSOR_SIZE,32

###############################################
# Environment
###############################################
env = QT_QPA_PLATFORMTHEME, qt5ct

###############################################
# Auto start
###############################################
# exec-once = hyprpaper
exec-once = awww-daemon --format xrgb
exec-once = ~/.config/hypr/wallpaper_restore.sh
exec-once = waybar
exec-once = swaync
exec-once = fcitx5
exec-once = dbus-update-activation-environment --systemd --all
exec-once = /usr/lib/polkit-kde-authentication-agent-1
exec-once = ~/.config/hypr/network-connect.sh
exec-once = clash-verge
