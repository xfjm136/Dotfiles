########## 字体 ##########

# 主字体：使用 Mono 版 Nerd Font，图标与等宽对齐更稳定
font_family          JetBrainsMono Nerd Font Mono
bold_font            auto
italic_font          auto
bold_italic_font     auto
font_size            13.5

# Nerd Font 图标 fallback，减少 Neovim 私有区符号乱码
symbol_map U+E000-U+F8FF Symbols Nerd Font
symbol_map U+F0000-U+FFFFD Symbols Nerd Font

# CJK 字体 fallback（中文显示更完美）
symbol_map U+4E00-U+9FFF Noto Sans CJK SC
symbol_map U+3040-U+30FF Noto Sans CJK SC
symbol_map U+FF00-U+FFEF Noto Sans CJK SC

# 行高和字符宽度微调，让 Jet 更协调
adjust_line_height  2
adjust_column_width 0

bold_as_bright no


########## 窗口外观 ##########

# 内边距（让终端更圆润美观）
window_padding_width  12
window_padding_height 10

# 透明度（配合 Hyprland 毛玻璃）
background_opacity 0.8
dynamic_background_opacity yes

# 禁用响铃
enable_audio_bell no
visual_bell_duration 0.0

scrollback_lines 5000

########## Catppuccin Mocha 主题 ##########

# 背景 / 前景
background #1e1e2e
foreground #cdd6f4

# 光标与选区
cursor            #f5e0dc
cursor_text_color #11111b
selection_foreground #11111b
selection_background #f5e0dc

# 常规 16 色
color0  #45475a
color1  #f38ba8
color2  #a6e3a1
color3  #f9e2af
color4  #89b4fa
color5  #f5c2e7
color6  #94e2d5
color7  #bac2de

color8  #585b70
color9  #f38ba8
color10 #a6e3a1
color11 #f9e2af
color12 #89b4fa
color13 #f5c2e7
color14 #94e2d5
color15 #cdd6f4


########## 行为 ##########

lang en_US.UTF-8
copy_on_select yes
strip_trailing_spaces smart
mouse_wheel_scroll_multiplier 3.0
detect_urls yes
underline_hyperlinks always

cursor_shape beam
cursor_beam_thickness 1.4
cursor_blink_interval 0

########## 快捷键 ##########

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

map ctrl+shift+enter new_window
map ctrl+shift+t     new_tab
map ctrl+shift+w     close_tab

map ctrl+shift+right next_tab
map ctrl+shift+left  previous_tab

map ctrl+shift+equal increase_font_size
map ctrl+shift+minus decrease_font_size
map ctrl+shift+backspace reset_font_size
